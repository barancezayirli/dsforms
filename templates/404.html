<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — dsforms</title>
  <style>
    :root {
      --page-bg: #F0F2F5;
      --surface: #ffffff;
      --text-primary: #1B1F2E;
      --text-muted: #8892AA;
      --border: #E4E8F0;
      --mint-dark: #34D399;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --radius: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--page-bg);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .error-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 32px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .error-code { font-size: 48px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
    .error-title { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
    .error-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
    .error-link { color: var(--mint-dark); font-size: 14px; text-decoration: none; }
    .error-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">404</div>
    <div class="error-title">Page not found</div>
    <div class="error-desc">The page you're looking for doesn't exist or has been moved.</div>
    <a class="error-link" href="/admin/forms">&larr; Back to dashboard</a>
  </div>
</body>
</html>
