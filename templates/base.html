{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — dsforms</title>
  <style>
    /* === Design Tokens (DSFORMS_FRONTEND.md §1) === */
    :root {
      --navy:        #1B1F2E;
      --navy-light:  #252B3D;
      --navy-border: #3D4668;
      --navy-muted:  #8892AA;
      --navy-text:   #C8D0E0;

      --mint:        #6EE7B7;
      --mint-dark:   #34D399;
      --mint-bg:     #ECFDF5;
      --mint-border: #A7F3D0;
      --mint-deep:   #065F46;
      --mint-focus:  #D1FAE5;

      --page-bg:     #F0F2F5;
      --surface:     #ffffff;
      --surface-alt: #F8F9FB;

      --text-primary:   #1B1F2E;
      --text-secondary: #4A5568;
      --text-muted:     #8892AA;
      --text-hint:      #B0BAD0;

      --border:       #E4E8F0;
      --border-light: #F0F2F5;

      --danger:        #DC2626;
      --danger-bg:     #FEF2F2;
      --danger-border: #FECACA;
      --warn-bg:       #FFFBEB;
      --warn-border:   #FDE68A;
      --warn-text:     #92400E;
      --success-bg:    #F0FDF9;
      --success-border:#A7F3D0;
      --success-text:  #065F46;

      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;

      --radius-sm: 6px;
      --radius:    8px;
      --radius-lg: 10px;
      --radius-xl: 12px;
    }

    /* === Global Reset (§2) === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--page-bg);
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--font); cursor: pointer; }
    input, textarea, select { font-family: var(--font); }

    /* === Nav (§3.1) === */
    .nav {
      background: var(--navy);
      height: 50px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 4px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand { color: var(--surface); font-size: 15px; font-weight: 500; letter-spacing: -0.02em; margin-right: 24px; flex-shrink: 0; }
    .nav-brand em { color: var(--mint); font-style: normal; }
    .nav-links { display: flex; align-items: center; gap: 2px; flex: 1; }
    .nav-link { color: var(--navy-muted); font-size: 13px; padding: 6px 10px; border-radius: var(--radius-sm); }
    .nav-link:hover { background: var(--navy-light); color: var(--navy-text); }
    .nav-link.on { background: var(--navy-light); color: var(--surface); }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .nav-user { color: var(--navy-muted); font-size: 13px; }
    .nav-user:hover { color: var(--navy-text); }
    .nav-logout { color: var(--navy-muted); font-size: 12px; background: none; border: none; padding: 5px 8px; border-radius: var(--radius-sm); }
    .nav-logout:hover { background: var(--navy-light); color: var(--navy-text); }
    .nav-burger { display: none; flex-direction: column; gap: 4px; background: none; border: none; padding: 6px; margin-left: 8px; }
    .nav-burger span { display: block; width: 18px; height: 1.5px; background: var(--navy-muted); }

    @media (max-width: 640px) {
      .nav-links { display: none; }
      .nav-links.open {
        display: flex; flex-direction: column; align-items: flex-start;
        position: absolute; top: 50px; left: 0; right: 0;
        background: var(--navy); padding: 8px 12px 12px; z-index: 99;
        border-bottom: 1px solid var(--navy-light);
      }
      .nav-right .nav-user { display: none; }
      .nav-burger { display: flex; }
    }

    /* === Warning Banner (§3.2) === */
    .warn-banner {
      background: var(--warn-bg);
      border-bottom: 1px solid var(--warn-border);
      padding: 9px 20px;
      font-size: 13px;
      color: var(--warn-text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .warn-banner a { color: var(--warn-text); font-weight: 500; text-decoration: underline; }

    /* === Flash (§3.3) === */
    .flash { padding: 10px 20px; font-size: 13px; border-bottom: 1px solid; }
    .flash-success { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }
    .flash-error { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger); }

    /* === Page Wrapper (§3.4) === */
    .page { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

    /* === Tables === */
    .table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .table th {
      padding: 11px 16px;
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: left;
    }
    .table td { padding: 11px 16px; border-bottom: 1px solid var(--border-light); }
    .table tr:last-child td { border-bottom: none; }
    .table a { color: var(--mint-deep); }
    .table a:hover { text-decoration: underline; }
    .text-muted { color: var(--text-muted); }
    .actions { white-space: nowrap; }
    .btn-ghost-danger { color: var(--danger); }
    .btn-ghost-danger:hover { background: var(--danger-bg); }

    /* === Stats (§3.9) === */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
    .stat-accent { border-top: 3px solid var(--mint); }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .stat-val { font-size: 22px; font-weight: 500; color: var(--text-primary); }
    @media (max-width: 640px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .stats .stat:last-child { grid-column: 1 / -1; }
    }

    /* === Page Header (§3.5) === */
    .page-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
    .page-title { font-size: 18px; font-weight: 500; color: var(--text-primary); }

    /* === Buttons (§3.6) === */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); cursor: pointer; white-space: nowrap; text-decoration: none; }
    .btn:hover { background: var(--surface-alt); }
    .btn-mint { background: var(--mint); color: var(--mint-deep); border-color: var(--mint-dark); }
    .btn-mint:hover { background: var(--mint-dark); }
    .btn-danger { border-color: var(--danger-border); color: var(--danger); background: var(--surface); }
    .btn-danger:hover { background: var(--danger-bg); }
    .btn-ghost { background: none; border: none; font-size: 13px; color: var(--text-muted); padding: 5px 8px; border-radius: var(--radius-sm); cursor: pointer; }
    .btn-ghost:hover { background: var(--page-bg); color: var(--text-secondary); }

    /* === Cards (§3.7) === */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .card-head { padding: 11px 16px; background: var(--surface-alt); border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .card-body { padding: 20px 16px; }

    /* === Form Inputs (§3.8) === */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
    input[type="text"], input[type="email"], input[type="password"], textarea {
      width: 100%; padding: 8px 11px; border-radius: var(--radius); border: 1px solid var(--border);
      background: var(--surface); color: var(--text-primary); font-size: 13px; font-family: var(--font); transition: border-color .15s;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--mint); box-shadow: 0 0 0 3px var(--mint-focus); }
    textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
    .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .form-error { font-size: 12px; color: var(--danger); margin-top: 4px; }
    .form-error-banner { background: var(--danger-bg); border: 1px solid var(--danger-border); color: var(--danger); padding: 8px 12px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; }

    /* === Empty State === */
    .empty-state { text-align: center; padding: 48px 20px; }
    .empty-state p { font-size: 15px; margin-bottom: 4px; }

    /* === Snippet === */
    .snippet-wrap { position: relative; }
    .snippet { background: var(--surface-alt); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 12px; font-family: var(--font-mono); overflow-x: auto; white-space: pre; line-height: 1.6; }
    .snippet-copy { position: absolute; top: 8px; right: 8px; }

    /* === Field blocks (used in submission detail) === */
    .field-block { margin-bottom: 22px; }
    .field-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .field-val { font-size: 14px; color: var(--text-primary); line-height: 1.6; }
    .field-msg {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-left: 3px solid var(--mint);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 14px 16px;
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    /* === Submission table styles === */
    .row-unread { background: var(--mint-bg); }
    .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--mint); display: inline-block; }
    .sub-name { font-weight: 500; color: var(--text-primary); }
    .sub-name:hover { color: var(--mint-deep); text-decoration: underline; }
    .sub-unread { font-weight: 600; }
    .sub-email { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .sub-preview { color: var(--text-muted); font-size: 13px; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pagination { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 20px; }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="/admin/forms">ds<em>forms</em></a>
    <div class="nav-links">
      <a class="nav-link {{if eq .Active "forms"}}on{{end}}" href="/admin/forms">Forms</a>
      <a class="nav-link {{if eq .Active "users"}}on{{end}}" href="/admin/users">Users</a>
      <a class="nav-link {{if eq .Active "backups"}}on{{end}}" href="/admin/backups">Backups</a>
    </div>
    <div class="nav-right">
      <a class="nav-user" href="/admin/account">{{.CurrentUser.Username}}</a>
      <form method="POST" action="/admin/logout" style="margin:0">
        <button class="nav-logout">Log out</button>
      </form>
    </div>
    <button class="nav-burger" id="nav-burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  {{if .CurrentUser.IsDefaultPassword}}
  <div class="warn-banner">
    Default password is active.
    <a href="/admin/account">Change it now &rarr;</a>
  </div>
  {{end}}

  {{if .Flash}}
  <div class="flash flash-{{.Flash.Type}}">{{.Flash.Message}}</div>
  {{end}}

  <div class="page">
    {{template "content" .}}
  </div>

  <script>
    document.getElementById('nav-burger').addEventListener('click', function() {
      document.querySelector('.nav-links').classList.toggle('open');
    });
  </script>
</body>
</html>
{{end}}
