{{template "base" .}}
{{define "content"}}
<div class="page-header">
  <h1 class="page-title">Add User</h1>
</div>

<div class="card" style="max-width:500px">
  <div class="card-body">
    {{if .Error}}
    <div class="form-error-banner">{{.Error}}</div>
    {{end}}
    <form method="POST" action="/admin/users/new">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" value="{{.FormUsername}}" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required>
      </div>
      <div style="display:flex;gap:8px;margin-top:20px">
        <button type="submit" class="btn btn-mint">Add User</button>
        <a href="/admin/users" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{{end}}
