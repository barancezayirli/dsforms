<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent — dsforms</title>
  <style>
    :root {
      --mint: #6EE7B7;
      --mint-deep: #065F46;
      --page-bg: #F0F2F5;
      --surface: #ffffff;
      --text-primary: #1B1F2E;
      --text-muted: #8892AA;
      --border: #E4E8F0;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --radius: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--page-bg);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .success-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 32px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .success-icon { font-size: 32px; color: var(--mint-deep); margin-bottom: 12px; }
    .success-title { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
    .success-back { color: var(--text-muted); font-size: 13px; margin-top: 16px; display: block; }
    .success-back:hover { color: var(--text-primary); }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="success-icon">&#10003;</div>
    <div class="success-title">Your message has been sent.</div>
    <a class="success-back" href="javascript:history.back()">&larr; Go back</a>
  </div>
</body>
</html>
